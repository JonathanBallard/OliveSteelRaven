{# templates/partials/footer.html #}
<footer class="bg-dark text-light py-2 mt-auto border-top border-secondary">
  <div class="container">
    <div class="d-flex flex-column flex-md-row align-items-center justify-content-between gap-2 small">

      <!-- Left: contact -->
      <div>
        <a class="text-light text-decoration-none" href="mailto:{{ CONTACT_EMAIL }}">
          {{ CONTACT_EMAIL }}
        </a>
      </div>

      <!-- Middle: social icons -->
      <div class="d-flex align-items-center gap-3">
        <a
          class="text-light text-decoration-none"
          href="{{ GITHUB_LINK }}"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub"
          title="GitHub"
        >
          <i class="bi bi-github fs-5"></i>
        </a>

        <a
          class="text-light text-decoration-none"
          href="{{ DEVELOPER_LINKEDIN }}"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="LinkedIn"
          title="LinkedIn"
        >
          <i class="bi bi-linkedin fs-5"></i>
        </a>
      </div>

      <!-- Right: copyright -->
      <div class="text-md-end">
        &copy; {{ DEVELOPER_NAME }} {% now "Y" %}
      </div>

    </div>
  </div>
</footer>
