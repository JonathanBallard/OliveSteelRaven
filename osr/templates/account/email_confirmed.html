{% extends "base.html" %}

{% block title %}Email Confirmed ● {{ APP_NAME }}{% endblock %}

{% block content %}
<div class="container content-container">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">

        <div class="card shadow-sm border-0">
          <div class="card-body p-4 text-center">

            <h1 class="h4 mb-2 page-title">Email Confirmed</h1>
            <p class="text-muted mb-4">
              You’re all set. Your email has been verified — welcome to the kitchen. 🧑‍🍳🔥
            </p>

            <div class="d-grid gap-2">
              <a href="{% url 'account_login' %}" class="btn btn-primary">
                Log In
              </a>

              {# Optional: if you have a homepage/dashboard route #}
              <a href="{% url 'accounts:home_page' %}" class="btn btn-outline-secondary">
                Go to Home
              </a>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
